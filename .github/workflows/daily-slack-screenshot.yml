name: Daily OB Report → Slack + Email

on:
  # Primary trigger: cron-job.org calls the workflow_dispatch REST API daily at 09:00 IST.
  # Backup trigger: GitHub's native cron (timing is best-effort, often late) — the guard
  # job below SKIPS the backup if a workflow_dispatch run already succeeded today, so the
  # report always goes out exactly once even if the external scheduler dies.
  workflow_dispatch: {}
  schedule:
    - cron: '15 4 * * *'   # 09:45 IST backup window (fires late sometimes; guard prevents dupes)

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      send: ${{ steps.check.outputs.send }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "send=yes" >> "$GITHUB_OUTPUT"; exit 0
          fi
          TODAY=$(date -u +%Y-%m-%d)
          COUNT=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?event=workflow_dispatch&status=success&created=%3E%3D$TODAY&per_page=50" \
            | jq '[.workflow_runs[] | select(.path == ".github/workflows/daily-slack-screenshot.yml")] | length')
          echo "Successful dispatch runs today: $COUNT"
          if [ "${COUNT:-0}" -gt 0 ]; then
            echo "Report already sent today — skipping backup run."
            echo "send=no" >> "$GITHUB_OUTPUT"
          else
            echo "send=yes" >> "$GITHUB_OUTPUT"
          fi

  report:
    needs: guard
    if: needs.guard.outputs.send == 'yes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright (Chromium)
        run: |
          npm install playwright@1
          npx playwright install --with-deps chromium
      - name: Screenshot Slack View → post to Slack
        env:
          REPORT_URL: https://spyne-onboarding-dashboard.vercel.app/#slack
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: node .github/scripts/daily-report.js
      - name: Screenshot Email View → email it (via Apps Script)
        if: ${{ always() }}   # send even if the Slack step failed
        env:
          EMAIL_REPORT_URL: https://spyne-onboarding-dashboard.vercel.app/#email
          EMAIL_TO: reports@spyne.ai
          APPS_SCRIPT_URL: https://script.google.com/macros/s/AKfycbzg3iR4fBWYjpwfG_68CDueg5RjqEZjQSNrUmqtEjfZl9Pe7Ai_7a5nqzG7mdyHzsWWdA/exec
          MAIL_SECRET: ${{ secrets.MAIL_SECRET }}
        run: node .github/scripts/email-report.js
      # NOTE: the Supabase snapshot/sync moved to its own 2-hourly workflow
      # (.github/workflows/sync-supabase.yml) so it no longer piggybacks on the daily report.
