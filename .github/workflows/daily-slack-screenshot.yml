name: Daily OB Report → Slack + Email

on:
  # Triggered daily at 09:00 IST by an external scheduler (cron-job.org) that calls
  # the workflow_dispatch REST API. GitHub's native cron was unreliable (ran ~8h late),
  # so it's removed. Also runnable manually from the Actions tab.
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps (Playwright + nodemailer)
        run: |
          npm install playwright@1 nodemailer
          npx playwright install --with-deps chromium
      - name: Screenshot Slack View → post to Slack
        env:
          REPORT_URL: https://spyne-onboarding-dashboard.vercel.app/#slack
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: node .github/scripts/daily-report.js
      - name: Screenshot Email View → email it
        if: ${{ always() }}   # send even if the Slack step failed
        env:
          EMAIL_REPORT_URL: https://spyne-onboarding-dashboard.vercel.app/#email
          EMAIL_TO: reports@spyne.ai
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: node .github/scripts/email-report.js
