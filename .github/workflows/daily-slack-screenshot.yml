name: Daily OB Report → Slack

on:
  # Triggered daily at 09:00 IST by an external scheduler (cron-job.org) that calls
  # the workflow_dispatch REST API. GitHub's native cron was unreliable (ran ~8h late),
  # so it's removed. Also runnable manually from the Actions tab.
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright (Chromium)
        run: |
          npm install playwright@1
          npx playwright install --with-deps chromium
      - name: Screenshot report and post to Slack
        env:
          REPORT_URL: https://spyne-onboarding-dashboard.vercel.app/#slack
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: node .github/scripts/daily-report.js
